{% extends 'base.html' %}

{% block content %}
<h1>All Recipes</h1>

<div class="recipe-grid" style="display: flex; flex-wrap: wrap; gap: 20px;">

    {% for recipe in recipes %}
    <div class="recipe-card" style="border: 1px solid #ccc; padding: 10px; width: 200px;">
        
        {% if recipe.image %}
            <img src="{{ recipe.image.url }}" alt="{{ recipe.title }}" style="width: 100%; height: auto;">
        {% else %}
            <div style="width: 100%; height: 150px; background-color: #eee; display: flex; align-items: center; justify-content: center;">
                No Image
            </div>
        {% endif %}
        
        <h3>{{ recipe.title }}</h3>
        <a href="{% url 'recipe_detail' recipe.id %}">View Recipe</a>
    </div>
    {% empty %}
        <p>No recipes found.</p>
    {% endfor %}

</div>
{% endblock %}
