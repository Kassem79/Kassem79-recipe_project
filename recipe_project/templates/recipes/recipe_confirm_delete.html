{% extends "base.html" %}

{% block content %}
<div class="recipe-delete">
    <h1>Delete Recipe</h1>
    <p>Are you sure you want to delete the recipe: <strong>{{ recipe.title }}</strong>?</p>
    
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'recipe_detail' recipe.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
