{% extends 'base.html' %}

{% block content %}

<section class="hero">
    <h1>Discover Delicious Recipes 🍽️</h1>
    <input type="text" id="search" placeholder="Search recipes...">
</section>

<section class="recipes">

<h2>Featured Recipes</h2>

<div class="recipe-grid">

{% for recipe in recipes %}

<div class="recipe-card">

    {% if recipe.image %}
        <img src="{{ recipe.image.url }}" alt="{{ recipe.title }}">
    {% endif %}

    <h3>{{ recipe.title }}</h3>

    <p>{{ recipe.description|truncatewords:10 }}</p>

    <a href="/recipe/{{ recipe.id }}/">View Recipe</a>

</div>

{% empty %}

<p>No recipes available.</p>

{% endfor %}

</div>

</section>

{% endblock %}
