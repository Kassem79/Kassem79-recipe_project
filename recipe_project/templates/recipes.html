{% extends 'base.html' %}

{% block content %}

<h1>All Recipes</h1>

<div class="recipe-grid">

{% for recipe in recipes %}

<div class="recipe-card">
    <img src="{{ recipe.image.url }}">
    <h3>{{ recipe.title }}</h3>
    <a href="/recipe/{{recipe.id}}">View</a>
</div>

{% endfor %}

</div>

{% endblock %}
