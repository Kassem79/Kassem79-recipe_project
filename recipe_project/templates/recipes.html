{% extends 'base.html' %}

{% block content %}

<h1>All Recipes</h1>

<div class="recipe-grid">

{% for recipe in recipes %}

<div class="recipe-card">

    {% if recipe.image %}
        <img src="{{ recipe.image.url }}" alt="{{ recipe.title }}">
    {% endif %}

    <h3>{{ recipe.title }}</h3>

    <a href="/recipe/{{ recipe.id }}/">View</a>

</div>

{% empty %}

<p>No recipes found.</p>

{% endfor %}

</div>

{% endblock %}
